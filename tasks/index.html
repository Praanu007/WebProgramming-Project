<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>All Separate Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <main class="shell-container">
    <section class="hero">
      <h1>Separate Task Pages</h1>
      <p>Open each task in its own page URL.</p>
      <ol id="links"></ol>
      <a class="btn btn-soft" href="../index.html">Back to Main Site</a>
    </section>
    <footer>Pranesh Nivasan | WebProgramming Project</footer>
  </main>
  <script>
    const links = document.getElementById("links");
    for (let i = 1; i <= 52; i += 1) {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.className = "link-light";
      a.href = `task.html?n=${i}`;
      a.textContent = `Task ${i}`;
      li.appendChild(a);
      links.appendChild(li);
    }
  </script>
</body>
</html>
